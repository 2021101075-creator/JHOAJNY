<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Regalo</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: black;
        font-family: Arial, sans-serif;
    }

    /* Fondo galaxia */
    .stars {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, #1a1a40, #000);
        overflow: hidden;
    }

    .stars::after {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: url('https://i.imgur.com/NM8Zl6g.png');
        opacity: 0.2;
        animation: moveStars 60s linear infinite;
    }

    @keyframes moveStars {
        from {transform: translate(0,0);}
        to {transform: translate(-500px,-500px);}
    }

    /* Caja regalo */
    .box {
        width: 200px;
        height: 200px;
        background: red;
        position: relative;
        cursor: pointer;
        border-radius: 10px;
        transition: 0.5s;
        z-index: 2;
    }

    .box::before {
        content: "TOCA PARA ABRIR";
        position: absolute;
        color: white;
        font-weight: bold;
        width: 100%;
        text-align: center;
        top: 80px;
    }

    .ribbon {
        position: absolute;
        width: 100%;
        height: 20px;
        background: gold;
        top: 50%;
        transform: translateY(-50%);
    }

    /* Rosa */
    .rose {
        display: none;
        font-size: 80px;
        animation: bloom 2s ease-in-out forwards;
    }

    @keyframes bloom {
        0% {transform: scale(0); opacity: 0;}
        100% {transform: scale(1.5); opacity: 1;}
    }

    .message {
        display: none;
        color: white;
        margin-top: 20px;
        font-size: 24px;
        text-align: center;
        animation: fadeIn 3s ease-in;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 2;
    }
</style>
</head>
<body>

<div class="stars"></div>

<div class="container">
    <div class="box" onclick="openGift()">
        <div class="ribbon"></div>
    </div>

    <div class="rose" id="rose">🌹</div>
    <div class="message" id="msg">ME GUSTAS MUCHO 💖</div>
</div>

<script>
function openGift() {
    document.querySelector('.box').style.display = 'none';
    document.getElementById('rose').style.display = 'block';
    document.getElementById('msg').style.display = 'block';
}
</script>

</body>
</html>
