<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Jhojany ❤️</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#0f172a,#1e1b4b,#000);
font-family:Arial,sans-serif;
color:white;
}

.estrellas{
position:fixed;
width:100%;
height:100%;
background-image:radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
opacity:.6;
}

.centro{
text-align:center;
z-index:10;
}

.regalo{
font-size:120px;
cursor:pointer;
animation:latir 1.5s infinite;
}

@keyframes latir{
50%{transform:scale(1.1);}
}

.texto{
font-size:28px;
margin-top:10px;
}

#sorpresa{
display:none;
animation:aparecer 1.5s;
}

.rosa{
font-size:140px;
animation:latir 2s infinite;
}

@keyframes aparecer{
from{opacity:0;transform:scale(.5);}
to{opacity:1;transform:scale(1);}
}

.mensaje{
max-width:600px;
padding:20px;
font-size:22px;
line-height:1.8;
}

.corazon{
position:fixed;
font-size:25px;
animation:subir 7s linear forwards;
}

@keyframes subir{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-100px);
opacity:1;
}
}
</style>
</head>

<body>

<div class="estrellas"></div>

<div class="centro" id="inicio">
<div class="regalo" onclick="abrir()">🎁</div>
<div class="texto">Toca para abrir ❤️</div>
</div>

<div class="centro" id="sorpresa">

<div class="rosa">🌹</div>

<div class="mensaje">

<h2>Para Jhojany ❤️</h2>

<p>
Hay algo que quería decirte desde hace tiempo...
</p>

<h1 style="color:#ff8fab;">
Me gustas mucho ❤️
</h1>

<p>
Me gusta tu sonrisa,
tu forma de ser
y la manera en que haces especiales incluso los días más simples.
</p>

<p>
Solo quería que lo supieras. 🌹
</p>

<p>
Con cariño,
<br><br>
<b>Daniel ❤️</b>
</p>

</div>

</div>

<script>

function abrir(){
document.getElementById("inicio").style.display="none";
document.getElementById("sorpresa").style.display="block";
}

setInterval(()=>{
let c=document.createElement("div");
c.className="corazon";
c.innerHTML="❤️";
c.style.left=Math.random()*100+"vw";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},7000);

},400);

</script>

</body>
</html>
